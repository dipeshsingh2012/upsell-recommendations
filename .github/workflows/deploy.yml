name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - backend/**

env:
  PROJECT_ID: upsell-recommendation
  REGION: us-central1
  REPO_NAME: upsell-api
  IMAGE_NAME: upsell-backend
  SERVICE_NAME: upsell-recommendations

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push
        run: |
          IMAGE_TAG="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/${IMAGE_NAME}:${{ github.sha }}"
          gcloud builds submit ./backend --tag $IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image=$IMAGE_TAG \
            --region=$REGION \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="GCP_PROJECT_ID=${PROJECT_ID},GCP_LOCATION=${REGION},ALLOWED_ORIGINS=https://upsell-recommendations.vercel.app" \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10
